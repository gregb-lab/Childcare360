<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Childcare360 — Childcare Management Platform</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='48' fill='%238B6DAF'/%3E%3Ctext x='50' y='58' text-anchor='middle' font-size='38' font-weight='900' font-family='Nunito,sans-serif' fill='white'%3E360%3C/text%3E%3C/svg%3E" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { background: #FAF7F4; overflow: hidden; font-family: 'Nunito', 'DM Sans', -apple-system, sans-serif; }
      #root { height: 100vh; }

      /* Selection */
      ::selection { background: #C4AED6; color: #2D2440; }

      /* Scrollbars — warm & subtle */
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #D4CBC2; border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: #BDB4A8; }

      /* Focus rings — soft plum glow */
      input:focus, select:focus, textarea:focus {
        outline: none;
        border-color: #8B6DAF !important;
        box-shadow: 0 0 0 3px rgba(139,109,175,0.12) !important;
      }

      /* ── ANIMATIONS ─────────────────────────────────────────── */
      @keyframes fadeInUp {
        from { opacity: 0; transform: translateY(12px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      @keyframes slideInLeft {
        from { opacity: 0; transform: translateX(-12px); }
        to { opacity: 1; transform: translateX(0); }
      }
      @keyframes slideInRight {
        from { opacity: 0; transform: translateX(12px); }
        to { opacity: 1; transform: translateX(0); }
      }
      @keyframes scaleIn {
        from { opacity: 0; transform: scale(0.96); }
        to { opacity: 1; transform: scale(1); }
      }
      @keyframes shimmer {
        0% { background-position: -200% 0; }
        100% { background-position: 200% 0; }
      }
      @keyframes gentlePulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.7; }
      }
      @keyframes softBounce {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-3px); }
      }

      /* Animation utility classes */
      .fade-in { animation: fadeIn 0.35s ease-out; }
      .fade-in-up { animation: fadeInUp 0.4s ease-out; }
      .slide-in-left { animation: slideInLeft 0.35s ease-out; }
      .slide-in-right { animation: slideInRight 0.35s ease-out; }
      .scale-in { animation: scaleIn 0.3s ease-out; }

      /* Smooth transitions on interactive elements */
      button, a, select, input {
        transition: all 0.2s ease;
      }
      button:hover {
        transform: translateY(-1px);
      }
      button:active {
        transform: translateY(0);
      }

      /* Card hover lift */
      .card-hover {
        transition: all 0.25s ease;
      }
      .card-hover:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 25px rgba(80,60,90,0.08);
      }

      /* Loading shimmer for skeleton states */
      .shimmer {
        background: linear-gradient(90deg, #F3EEE8 25%, #EDE6E0 50%, #F3EEE8 75%);
        background-size: 200% 100%;
        animation: shimmer 1.8s ease-in-out infinite;
      }

      /* Gentle pulse for status indicators */
      .pulse-gentle {
        animation: gentlePulse 2s ease-in-out infinite;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
